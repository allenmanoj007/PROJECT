  <body class="bg-gray-50 text-gray-900 dark:bg-dark-bg dark:text-dark-text min-h-screen font-sans transition-colors duration-200">
    <div id="root"></div>
    <script type="text/javascript">
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .join("?");
        window.history.replaceState(
          null,
          null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    })(window.location);
  </script>
